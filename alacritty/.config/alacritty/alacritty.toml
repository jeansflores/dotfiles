[window.padding]
x = 2
y = 2

[font]
size = 12.0

[font.normal]
family = "IosevkaTerm Nerd Font"
style = "Regular"

[font.bold]
family = "IosevkaTerm Nerd Font"
style = "Bold"

[font.italic]
family = "IosevkaTerm Nerd Font"
style = "Italic"

[font.bold_italic]
family = "IosevkaTerm Nerd Font"
style = "Bold Italic"

# Zellij default theme palette
[colors.primary]
background = "#000000"
foreground = "#eeeeee"

[colors.normal]
black   = "#000000"
red     = "#cd0000"
green   = "#00cd00"
yellow  = "#cdcd00"
blue    = "#0000ee"
magenta = "#cd00cd"
cyan    = "#00cdcd"
white   = "#e5e5e5"

[colors.bright]
black   = "#7f7f7f"
red     = "#ff0000"
green   = "#00ff00"
yellow  = "#ffff00"
blue    = "#5c5cff"
magenta = "#ff00ff"
cyan    = "#00ffff"
white   = "#ffffff"
