[colors]
bg      = #1a1a1a
fg      = #d8d8d8
fg-dim  = #888888
blue    = #51A2DA
blue-hi = #83CAFA
urgent  = #DB3279
sep     = #444444

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 24
radius = 0
fixed-center = true

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 3

border-size = 0
padding-left = 1
padding-right = 1

tray-position = right
tray-padding = 4
module-margin-left = 1
module-margin-right = 1

font-0 = monospace:size=9;2
font-1 = FontAwesome:size=9;2

separator = %{F#444444}|%{F-}

modules-left   = i3
modules-center = date
modules-right  = cpu memory pulseaudio power-profile keyboard-layout

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false

label-focused            = %index%
label-focused-fg         = #ffffff
label-focused-bg         = ${colors.blue}
label-focused-underline  = ${colors.blue-hi}
label-focused-padding    = 1

label-unfocused        = %index%
label-unfocused-fg     = ${colors.fg-dim}
label-unfocused-padding = 1

label-urgent        = %index%
label-urgent-fg     = #ffffff
label-urgent-bg     = ${colors.urgent}
label-urgent-padding = 1

label-visible        = %index%
label-visible-fg     = ${colors.fg-dim}
label-visible-padding = 1

[module/cpu]
type = internal/cpu
interval = 2
label = CPU %percentage%%
click-left = alacritty -e btop &

[module/memory]
type = internal/memory
interval = 3
label = RAM %percentage_used%%
click-left = alacritty -e btop &

[module/pulseaudio]
type = custom/script
exec = ~/.config/polybar/volume.sh
interval = 2
click-left = pavucontrol &
click-right = ~/.config/polybar/volume.sh mute
scroll-up = ~/.config/polybar/volume.sh up
scroll-down = ~/.config/polybar/volume.sh down

[module/power-profile]
type = custom/script
exec = ~/.config/polybar/power-profile.sh
interval = 2
click-left = ~/.config/polybar/power-profile.sh toggle
cursor-click = pointer

[module/keyboard-layout]
type = custom/script
exec = ~/.config/polybar/keyboard-layout.sh
interval = 1
click-left = ~/.config/polybar/keyboard-layout.sh toggle
label = %{F#83CAFA}⌨%{F-} %output%
cursor-click = pointer

[module/date]
type = internal/date
interval = 30
date = %a %d/%m
time = %H:%M
label = %date%  %time%
